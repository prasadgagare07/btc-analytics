
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BTC Analytics</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>BTC Analytics Platform</h1>

<div class="card">
<h2>Server Status</h2>
<p id="status">Checking...</p>
</div>

<div class="card">
<h2>Live BTC Price</h2>
<p id="price">Loading...</p>
</div>

<div class="card">
<h2>Buy Volume</h2>
<p id="buyVolume">Loading...</p>
</div>

<div class="card">
<h2>Sell Volume</h2>
<p id="sellVolume">Loading...</p>
</div>

<div class="card">
<h2>Delta</h2>
<p id="delta">Loading...</p>
</div>

<div class="card">
<h2>EMA 9</h2>
<p id="ema9">Loading...</p>
</div>

<div class="card">
<h2>EMA 21</h2>
<p id="ema21">Loading...</p>
</div>

<div class="card">
<h2>RSI</h2>
<p id="rsi">Loading...</p>
</div>
<div class="card">
<h2>BTC Price Chart</h2>
<div id="priceChart" style="width:100%;height:400px;"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script src="script.js"></script>

 <script src="script.js"></script>

</body>

</html>
